<meta name="theme-color" content="#1a0a2e">
<title>🏐 バレー組み合わせ</title>
<style>
:root{--pink:#ff6eb4;--yellow:#ffe94a;--cyan:#4af0ff;--green:#5dff8f;--orange:#ff8c42;--purple:#c084fc;--bg:#1a0a2e;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:#fff;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);overflow-x:hidden;}
.bg-wrap{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.blob{position:absolute;border-radius:50%;filter:blur(70px);animation:blob 8s ease-in-out infinite;}
.b1{width:350px;height:350px;background:rgba(255,110,180,0.18);top:-10%;left:-10%;}
.b2{width:300px;height:300px;background:rgba(74,240,255,0.15);bottom:0;right:-5%;animation-delay:-3s;}
.b3{width:250px;height:250px;background:rgba(93,255,143,0.12);top:40%;left:30%;animation-delay:-5s;}
@keyframes blob{0%,100%{transform:scale(1) translate(0,0);}50%{transform:scale(1.15) translate(20px,-20px);}}
#app{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:20px 14px 100px;display:flex;flex-direction:column;gap:14px;}
.hdr{text-align:center;padding:8px 0 2px;}
.hdr .ico{font-size:50px;display:block;animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.hdr h1{font-size:21px;font-weight:900;margin-top:4px;}
.hdr h1 .y{color:var(--yellow);}.hdr h1 .p{color:var(--pink);}
.hdr p{display:none;}
.card{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:20px;padding:16px;}
.clbl{font-size:11px;font-weight:800;letter-spacing:0.1em;margin-bottom:10px;}
.tabs{display:flex;gap:6px;}
.tab{flex:1;padding:9px 4px;border-radius:13px;border:2px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-size:11px;font-weight:800;cursor:pointer;transition:all 0.18s;text-align:center;line-height:1.3;}
.tab.on{background:var(--yellow);color:#2d1555;border-color:var(--yellow);box-shadow:0 0 14px rgba(255,233,74,0.5);transform:scale(1.03);}
.cbtns{display:flex;gap:10px;}
.cbtn{flex:1;padding:12px;border-radius:13px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-size:14px;font-weight:900;cursor:pointer;transition:all 0.18s;}
.cbtn .sub{font-size:10px;font-weight:500;opacity:0.6;margin-top:2px;}
.cbtn.on{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;border-color:transparent;box-shadow:0 0 18px rgba(74,240,255,0.4);transform:scale(1.04);}
.ngrid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;}
.nbtn{padding:7px 0;border-radius:9px;border:none;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.32);font-size:12px;font-weight:800;cursor:pointer;transition:all 0.13s;}
.nbtn.ab{background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;}
.nbtn.ar{background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;}
.name-list{display:flex;flex-direction:column;gap:6px;}
.name-row{display:flex;align-items:center;gap:8px;}
.nidx{font-size:13px;font-weight:900;width:22px;flex-shrink:0;text-align:center;}
.nidx.m{color:#7dd3fc;}.nidx.f{color:var(--pink);}

<body>
<div class="bg-wrap"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div id="app"></div>
<script>
// ============================================================
// バレー組み合わせアプリ ロジック（完全書き直し版）
// 設計方針: onclick属性は単純な文字列のみ渡す。状態操作は全てグローバル関数で完結。
// ============================================================

function shuffle(arr){
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== ユニット構築 =====
function buildUnits(mNames, fNames, pairs, teams) {
  var usedM = {}, usedF = {}, units = [];
  teams.forEach(function(t, i){
    var members = [mNames[t.m1], mNames[t.m2], fNames[t.f1], fNames[t.f2]];
    units.push({type:'team', members:members, id:'t'+i, label:members.join('/')});
    usedM[t.m1]=true; usedM[t.m2]=true; usedF[t.f1]=true; usedF[t.f2]=true;
  });
  pairs.forEach(function(p, i){
    if (usedM[p.mIdx] || usedF[p.fIdx]) return;
    units.push({type:'pair', members:[mNames[p.mIdx], fNames[p.fIdx]], id:'p'+i, label:mNames[p.mIdx]+'&'+fNames[p.fIdx]});
    usedM[p.mIdx]=true; usedF[p.fIdx]=true;
  });
  mNames.forEach(function(m, i){ if(!usedM[i]) units.push({type:'solo', members:[m], id:'sm'+i, label:m, gender:'m'}); });
  fNames.forEach(function(f, i){ if(!usedF[i]) units.push({type:'solo', members:[f], id:'sf'+i, label:f, gender:'f'}); });
  return units;
}

// 配列からk個選ぶ全組み合わせ
function combos(arr, k){
  var result = [];
  function pick(start, chosen){
    if (chosen.length === k){ result.push(chosen.slice()); return; }
    for (var i = start; i < arr.length; i++){ chosen.push(arr[i]); pick(i+1, chosen); chosen.pop(); }
  }
  pick(0, []);
  return result;
}

// ===== ゲーム生成 =====
// courts: コート数(1 or 2)。必要人数は courts*4 (男女それぞれ)
// forcePlay: このゲームで必ず出場させたい名前の配列（途中追加の新人など）
function generateGame(mNames, fNames, pairs, teams, courts, playCount, playedWith, absent, forcePlay, gamesPlayed, joinedAt) {
  absent = absent || {};
  gamesPlayed = gamesPlayed || 0;
  joinedAt = joinedAt || {}; // 各プレイヤーが参加を開始したゲーム番号（デフォルト0=最初から）
  var forceSet = {};
  (forcePlay||[]).forEach(function(n){ forceSet[n]=true; });

  var units = buildUnits(mNames, fNames, pairs, teams);

  function upc(u){ return Math.min.apply(null, u.members.map(function(m){ return playCount[m]||0; })); }
  var lastRested = playedWith['__lastRested__'] || {};

  var needM = courts * 4, needF = courts * 4;

  function unitScore(u){
    var isAbsentUnit = u.members.some(function(m){ return absent[m]; });
    if (isAbsentUnit) return 99999999; // 欠席者ユニットは絶対最後
    var isForced = u.members.some(function(m){ return forceSet[m]; });
    if (isForced) return -99999999; // 強制出場ユニットは絶対最優先

    // 出場率が低い人を優先。
    // 途中から参加した人は「参加してからのゲーム数」を基準に出場率を計算する。
    // これにより、入ってからは他の人と同じペースで均等に回りつつ、
    // 遅れてきた分の出場回数が少ないのは自然に維持される。
    function memberRate(m){
      var joined = joinedAt[m] || 0;
      var participatedGames = gamesPlayed - joined;
      if (participatedGames <= 0) return 0;
      return (playCount[m]||0) / participatedGames;
    }
    var rate = Math.min.apply(null, u.members.map(memberRate));
    var base = rate * 100000000 + upc(u); // 同率の場合は出場回数の少なさで僅差をつける
    return base;
  }
  var sortedUnits = shuffle(units).sort(function(a,b){ return unitScore(a)-unitScore(b); });

  // 欠席者ユニットは候補から除外
  var availableUnits = sortedUnits.filter(function(u){ return !u.members.some(function(m){ return absent[m]; }); });
  var absentUnits = sortedUnits.filter(function(u){ return u.members.some(function(m){ return absent[m]; }); });

  function pickPlaying(nm, nf){
    // availableUnitsはunitScore順(優先度順=出場回数が少ない人が先頭)。
    // 単純な貪欲法だと「ソロが先に男性側だけ枠を埋めてペア/チームの女性枠を巻き込んで弾く」事故が起きるため、
    // 性別ごとの「現在の不足数」を見ながら、入れたら確実に必要数を超過しない範囲で、
    // 優先順位(unitScore順)が高いものから一つずつ確定させていく。
    // ポイント: 「入れたら不足側の性別が超過する」ユニットは一旦保留(後回し)にし、
    // 優先順位の higher なもの(他の性別)を先に確定させてから、保留分を再評価する。
    var play=[], rest=[], mc=0, fc=0;
    var pending = availableUnits.slice(); // unitScore順を維持した残り候補
    var changed = true;
    while (changed){
      changed = false;
      for (var i=0; i<pending.length; i++){
        var u = pending[i];
        var needM = u.type==='team' ? 2 : (u.type==='pair' ? 1 : (u.gender==='m' ? 1 : 0));
        var needF = u.type==='team' ? 2 : (u.type==='pair' ? 1 : (u.gender==='f' ? 1 : 0));
        if (mc+needM<=nm && fc+needF<=nf){
          play.push(u); mc+=needM; fc+=needF;
          pending.splice(i,1);
          changed = true;
          break; // 1つ確定したらpendingの状態が変わったので、先頭からunitScore順に再評価
        }
      }
    }
    rest = pending.concat(absentUnits);
    return {play:play, rest:rest, mc:mc, fc:fc};
  }

  // 必要人数ぴったりで試みる。それで全部埋まらない場合のみ、
  // 「実際に出場可能な最大人数（4の倍数に近い形）」で再試行する。
  // ※ 2コート時に1コート相当へ縮退しないよう、courts情報を保持したまま調整する。
  var sel = pickPlaying(needM, needF);

  // 不足時のフォールバック: 利用可能な男女それぞれの最大人数（4の倍数に丸めて、courts以下）を使う
  if (sel.mc < needM || sel.fc < needF) {
    var availM = 0, availF = 0;
    availableUnits.forEach(function(u){
      if (u.type==='team'){ availM+=2; availF+=2; }
      else if (u.type==='pair'){ availM+=1; availF+=1; }
      else if (u.gender==='m'){ availM+=1; }
      else { availF+=1; }
    });
    var maxCourtsM = Math.floor(availM/4);
    var maxCourtsF = Math.floor(availF/4);
    var usableCourts = Math.max(0, Math.min(courts, maxCourtsM, maxCourtsF));
    var fbM = usableCourts*4, fbF = usableCourts*4;
    if (usableCourts > 0) {
      sel = pickPlaying(fbM, fbF);
    } else {
      // 1コート分すら満たせない場合は、可能な範囲で4人ずつ目指す
      sel = pickPlaying(4, 4);
    }
  }

  var playing = sel.play, resting = sel.rest;
  var actualCourts = Math.max(1, Math.round(Math.min(sel.mc, sel.fc) / 4)) || 1;
  if (sel.mc === 0 && sel.fc === 0) actualCourts = 0;

  var pairSet = {}, teamSet = {};
  units.forEach(function(u){
    if (u.type==='pair') u.members.forEach(function(m){ pairSet[m]=true; });
    if (u.type==='team') u.members.forEach(function(m){ teamSet[m]=true; });
  });

  function teamScore(members){
    var s=0, mx=0;
    for (var a=0; a<members.length; a++) for (var b=a+1; b<members.length; b++){
      var ma = members[a], mb = members[b];
      var c = (playedWith[ma] && playedWith[ma][mb]) || 0;
      // 同性同士が一緒になった回数は特に重く評価（いろんな組み合わせを促進）
      var isSameGender = (mNames.indexOf(ma)>=0 && mNames.indexOf(mb)>=0) ||
                         (fNames.indexOf(ma)>=0 && fNames.indexOf(mb)>=0);
      var weight = isSameGender ? 10 : 1;
      s += c * weight;
      if (c * weight > mx) mx = c * weight;
    }
    return s*10 + mx;
  }

  // 1コート分(4対4)のA/B分け。ペア・チームは崩さず、ソロは全列挙。
  function splitOneCourt(courtUnits){
    var cT = courtUnits.filter(function(u){ return u.type==='team'; });
    var cP = courtUnits.filter(function(u){ return u.type==='pair'; });
    var cM = courtUnits.filter(function(u){ return u.type==='solo' && u.gender==='m'; });
    var cF = courtUnits.filter(function(u){ return u.type==='solo' && u.gender==='f'; });

    var candidates = [];
    for (var tm=0; tm<(1<<cT.length); tm++){
      var tA=[], tB=[];
      cT.forEach(function(u,i){ if (tm & (1<<i)) tA.push(u); else tB.push(u); });
      for (var pm=0; pm<(1<<cP.length); pm++){
        var pA = tA.slice(), pB = tB.slice();
        cP.forEach(function(u,i){ if (pm & (1<<i)) pA.push(u); else pB.push(u); });
        var pAm=0, pBm=0, pAf=0, pBf=0;
        pA.forEach(function(u){ if (u.type==='team'){pAm+=2;pAf+=2;} else {pAm++;pAf++;} });
        pB.forEach(function(u){ if (u.type==='team'){pBm+=2;pBf+=2;} else {pBm++;pBf++;} });
        var needAm=2-pAm, needBm=2-pBm, needAf=2-pAf, needBf=2-pBf;
        if (needAm<0||needBm<0||needAf<0||needBf<0) continue;
        if (cM.length < needAm+needBm || cF.length < needAf+needBf) continue;
        var mCombos = combos(cM, needAm);
        var fCombos = combos(cF, needAf);
        mCombos.forEach(function(mSel){
          var mRest = cM.filter(function(u){ return mSel.indexOf(u) < 0; });
          fCombos.forEach(function(fSel){
            var fRest = cF.filter(function(u){ return fSel.indexOf(u) < 0; });
            var mA=[], mB=[];
            pA.forEach(function(u){ u.members.forEach(function(x){ mA.push(x); }); });
            pB.forEach(function(u){ u.members.forEach(function(x){ mB.push(x); }); });
            mSel.forEach(function(u){ mA.push(u.members[0]); });
            mRest.slice(0, needBm).forEach(function(u){ mB.push(u.members[0]); });
            fSel.forEach(function(u){ mA.push(u.members[0]); });
            fRest.slice(0, needBf).forEach(function(u){ mB.push(u.members[0]); });
            if (mA.length!==4 || mB.length!==4) return;
            candidates.push({A:mA, B:mB, score: teamScore(mA)+teamScore(mB)});
          });
        });
      }
    }
    if (candidates.length===0) return null;
    var minSc = candidates.reduce(function(mn,c){ return Math.min(mn,c.score); }, Infinity);
    var best = candidates.filter(function(c){ return c.score===minSc; });
    return best[Math.floor(Math.random()*best.length)];
  }

  // コートへの分割
  var courtResults = [];
  var totalM = sel.mc, totalF = sel.fc;
  var numFullCourts = Math.floor(Math.min(totalM, totalF) / 4);

  if (numFullCourts <= 1) {
    // 0または1コート分のみ -> 1つのグループとしてsplit
    var r = splitOneCourt(playing);
    if (r) {
      courtResults = [r];
    } else {
      // 完全分割できない端数構成。あるだけ並べる（クラッシュ回避）
      var fm = [];
      playing.forEach(function(u){ u.members.forEach(function(m){ fm.push(m); }); });
      fm = shuffle(fm);
      courtResults = [{A: fm.slice(0,4), B: fm.slice(4,8)}];
    }
  } else {
    // 2コート分配: チーム・ペアをコート間に割り振り、それぞれでsplitOneCourt
    var pT = playing.filter(function(u){ return u.type==='team'; });
    var pP = playing.filter(function(u){ return u.type==='pair'; });
    var pM = playing.filter(function(u){ return u.type==='solo' && u.gender==='m'; });
    var pF = playing.filter(function(u){ return u.type==='solo' && u.gender==='f'; });
    var bestScore = Infinity, bestPair = null;

    for (var tmask=0; tmask<(1<<pT.length); tmask++){
      for (var pmask=0; pmask<(1<<pP.length); pmask++){
        var c1t=[], c2t=[], c1p=[], c2p=[];
        pT.forEach(function(u,i){ if (tmask & (1<<i)) c1t.push(u); else c2t.push(u); });
        pP.forEach(function(u,i){ if (pmask & (1<<i)) c1p.push(u); else c2p.push(u); });
        var c1Fixed = c1t.length*2 + c1p.length;
        var c2Fixed = c2t.length*2 + c2p.length;
        var need1 = 4 - c1Fixed, need2 = 4 - c2Fixed;
        if (need1 < 0 || need2 < 0) continue;
        if (pM.length < need1+need2 || pF.length < need1+need2) continue;

        for (var trial=0; trial<40; trial++){
          var sm = shuffle(pM.slice()), sf = shuffle(pF.slice());
          var c1Units = c1t.concat(c1p).concat(sm.slice(0,need1)).concat(sf.slice(0,need1));
          var c2Units = c2t.concat(c2p).concat(sm.slice(need1,need1+need2)).concat(sf.slice(need1,need1+need2));
          var r1 = splitOneCourt(c1Units), r2 = splitOneCourt(c2Units);
          if (!r1 || !r2) continue;
          var tsc = r1.score + r2.score;
          if (tsc < bestScore){ bestScore = tsc; bestPair = [r1, r2]; }
        }
      }
    }
    courtResults = bestPair || (function(){
      var r = splitOneCourt(playing);
      return r ? [r] : [{A:[], B:[]}];
    })();
  }

  var restMembers = [];
  resting.forEach(function(u){ u.members.forEach(function(m){ restMembers.push(m); }); });

  return {
    courts: courtResults,
    resting: restMembers,
    pairSet: pairSet,
    teamSet: teamSet,
    units: units
  };
}

function updPW(game, pw){
  var p = JSON.parse(JSON.stringify(pw));
  game.courts.forEach(function(ct){
    [ct.A, ct.B].forEach(function(team){
      for (var i=0; i<team.length; i++) for (var j=i+1; j<team.length; j++){
        var a=team[i], b=team[j];
        if (!p[a]) p[a]={}; if (!p[b]) p[b]={};
        p[a][b]=(p[a][b]||0)+1; p[b][a]=(p[b][a]||0)+1;
      }
    });
  });
  p['__lastRested__'] = {};
  game.resting.forEach(function(m){ p['__lastRested__'][m]=true; });
  return p;
}
function updPC(game, pc){
  var p = Object.assign({}, pc);
  game.courts.forEach(function(ct){ ct.A.concat(ct.B).forEach(function(n){ p[n]=(p[n]||0)+1; }); });
  return p;
}

function checkLap(mNames, fNames, pairs, teams, pw){
  var usedM={}, usedF={};
  teams.forEach(function(t){ usedM[t.m1]=true; usedM[t.m2]=true; usedF[t.f1]=true; usedF[t.f2]=true; });
  pairs.forEach(function(p){ usedM[p.mIdx]=true; usedF[p.fIdx]=true; });
  var soloM = mNames.filter(function(_,i){ return !usedM[i]; });
  var soloF = fNames.filter(function(_,i){ return !usedF[i]; });
  var checkNames = soloM.length >= soloF.length ? soloM : soloF;
  if (checkNames.length < 2) return false;
  for (var i=0; i<checkNames.length; i++){
    for (var j=i+1; j<checkNames.length; j++){
      var cnt = (pw[checkNames[i]] && pw[checkNames[i]][checkNames[j]]) || 0;
      if (cnt === 0) return false;
    }
  }
  return true;
}

        + '<div class="vslbl">⚡<br>VS<br>⚡</div>'
        + '<div class="tbox tb"><div class="tlbl">🔴 Bチーム</div><div class="tplayers">'+bHTML+'</div></div>'
        + '</div></div>';
    });
    
    if (g.resting.length>0){
      h += '<div class="card rcard"><div class="rttl">💤 今回の休み</div><div class="chips">';
      g.resting.forEach(function(p){
        var isMale = mN.indexOf(p)>=0;
        var cls = teamSet[p] ? 'team' : (pairSet[p] ? 'pair' : (isMale?'solo-m':'solo-f'));
        h += '<span class="unit-tag '+cls+'">'+esc(p)+'</span>';
      });
      h += '</div></div>';
    }


    if (s.stats){
      h += '<div class="card"><div class="clbl" style="color:var(--yellow)">📊 累計出場回数（'+gn+'ゲーム終了時点）</div><div class="sbars">';
      gameUnits.forEach(function(u){
        var cnt = Math.min.apply(null, u.members.map(function(m){ return s.pc[m]||0; }));
        var pct = mx>0 ? cnt/mx*100 : 0;
        var cls = u.type==='team' ? 't' : (u.type==='pair' ? 'p' : (u.gender==='m'?'m':'f'));
        h += '<div class="srow"><span class="slbl '+cls+'">'+esc(u.label)+'</span><div class="strk"><div class="sfil '+cls+'" style="width:'+pct+'%"></div></div><span class="scnt">'+cnt+'</span></div>';
      });
      h += '</div></div>';
    }

    if (s.histView){
      h += '<div class="card"><div class="clbl" style="color:var(--cyan)">📋 同チーム回数（'+gn+'ゲーム終了時点）</div>'
        + '<div style="font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:8px">数字は同じチームになった回数。多いほど組み合わせが偏っています。</div>'
        + '<div class="hist-table-wrap"><table class="hist-table"><thead><tr><th>-</th>';
      allP.forEach(function(p){ h += '<th>'+esc(p.length>3?p.slice(0,3)+'…':p)+'</th>'; });
      h += '</tr></thead><tbody>';
      allP.forEach(function(pa){
        h += '<tr><td class="rname">'+esc(pa)+'</td>';
        allP.forEach(function(pb){
          if (pa===pb){ h += '<td class="self">-</td>'; return; }
          var cnt = (s.pw[pa] && s.pw[pa][pb]) || 0;
          var cls = cnt>=4 ? 'high' : (cnt>=2 ? 'mid' : '');
          h += '<td class="'+(cls||'')+'">'+cnt+'</td>';
        });
        h += '</tr>';
      });
      h += '</tbody></table></div></div>';
    }

    h += '<div class="btn-nx-wrap"><button class="btn-nx" onclick="nextGame()">次のゲーム → 🏐</button></div>';
  }

  document.getElementById('app').innerHTML = h;
}

function setCourts(n){ S.courts = n; render(); }
function setMen(n){ S.men = n; render(); }
function setWomen(n){ S.women = n; render(); }

function goCount(){ S.mNames=getMNames(); S.fNames=getFNames(); S.setupStep='count'; render(); }
function goNames(){
  S.mNames = (function(){ var a=[]; for(var i=0;i<S.men;i++) a.push(S.mNames[i]||('男'+(i+1))); return a; })();
  S.fNames = (function(){ var a=[]; for(var i=0;i<S.women;i++) a.push(S.fNames[i]||('女'+(i+1))); return a; })();
  S.setupStep = 'names'; render();
}
function goUnits(){
  S.mNames = getMNames(); S.fNames = getFNames();
  S.mNames = S.mNames.map(function(n,i){ return n||('男'+(i+1)); });
  S.fNames = S.fNames.map(function(n,i){ return n||('女'+(i+1)); });
  S.pairs = S.pairs.filter(function(p){ return p.mIdx<S.men && p.fIdx<S.women; });
  S.teams = S.teams.filter(function(t){ return t.m1<S.men && t.m2<S.men && t.f1<S.women && t.f2<S.women; });
  S.teamSel = [];
  S.setupStep = 'units'; render();
}

function addPair(){
  var mEl=document.getElementById('npm'), fEl=document.getElementById('npf');
  if (!mEl || !fEl) return;
  var mi=parseInt(mEl.value), fi=parseInt(fEl.value);
  var usedM={}, usedF={};
  S.teams.forEach(function(t){ usedM[t.m1]=true; usedM[t.m2]=true; usedF[t.f1]=true; usedF[t.f2]=true; });
  S.pairs.forEach(function(p){ usedM[p.mIdx]=true; usedF[p.fIdx]=true; });
  if (usedM[mi] || usedF[fi]) return;
  S.pairs.push({mIdx:mi, fIdx:fi}); render();
}
function removePair(i){ S.pairs.splice(i,1); render(); }

function toggleTeamSel(name){
  var mN=S.mNames, fN=S.fNames;
  var isMale = mN.indexOf(name)>=0;
  var selM = S.teamSel.filter(function(x){ return mN.indexOf(x)>=0; });
  var selF = S.teamSel.filter(function(x){ return fN.indexOf(x)>=0; });
  var idx = S.teamSel.indexOf(name);
  if (idx>=0){ S.teamSel.splice(idx,1); }
  else {
    if (isMale && selM.length>=2) return;
    if (!isMale && selF.length>=2) return;
    S.teamSel.push(name);
  }
  render();
}
function addTeam(){
  var mN=S.mNames, fN=S.fNames;
  var selM = S.teamSel.filter(function(x){ return mN.indexOf(x)>=0; });
  var selF = S.teamSel.filter(function(x){ return fN.indexOf(x)>=0; });
  if (selM.length!==2 || selF.length!==2) return;
  S.teams.push({m1:mN.indexOf(selM[0]), m2:mN.indexOf(selM[1]), f1:fN.indexOf(selF[0]), f2:fN.indexOf(selF[1])});
  S.teamSel = [];
  render();
}
function removeTeam(i){ S.teams.splice(i,1); S.teamSel=[]; render(); }

function toggleStats(){ S.stats = !S.stats; S.histView=false; render(); }
function toggleHist(){ S.histView = !S.histView; S.stats=false; render(); }

function startGame(){
  S.lapShownGi = -1;
  S.forcePlayNext = [];
  S.joinedAt = {};
  var g = generateGame(S.mNames, S.fNames, S.pairs, S.teams, S.courts, {}, {}, {}, [], 0, {});
  S.game = g; S.pw = {}; S.pc = updPC(g, {}); S.hist = [g]; S.gi = 0;
  S.stats = false; S.histView = false; S.step = 'game'; S.showResume = false;
  saveState(); render(); window.scrollTo(0,0);
}
function nextGame(){
  var wasLap = checkLap(S.mNames, S.fNames, S.pairs, S.teams, S.pw);
  var npw = updPW(S.game, S.pw);
  var npc = updPC(S.game, S.pc);
  var force = S.forcePlayNext || [];
  var g = generateGame(S.mNames, S.fNames, S.pairs, S.teams, S.courts, npc, npw, {}, force, S.gi+1, S.joinedAt);
  S.forcePlayNext = [];
  S.pw = npw; S.pc = npc; S.game = g; S.hist.push(g); S.gi++;
  var isLapNow = checkLap(S.mNames, S.fNames, S.pairs, S.teams, S.pw);
  if (isLapNow && !wasLap){ S.lapShownGi = S.gi; }
  saveState(); render(); window.scrollTo(0,0);
}
function resetApp(){
  S.step='setup'; S.setupStep='count'; S.hist=[]; S.game=null; S.pw={}; S.pc={}; S.gi=0;
  S.stats=false; S.histView=false; S.showResume=false; S.lapShownGi=-1; S.forcePlayNext=[]; S.joinedAt={};
  clearSave(); render(); window.scrollTo(0,0);
}

// 性別を指定して「次の番号」の名前候補を作る（例: 男1〜男6が居れば次は「男7」）
function nextSuggestedName(gender){
  var prefix = gender==='m' ? '男' : '女';
  var list = gender==='m' ? S.mNames : S.fNames;
  var maxNum = 0;
  list.forEach(function(n){
    var m = n.match(/^(\d+)$/) ? null : n.match(new RegExp('^'+prefix+'(\\d+)$'));
    if (m){ var num = parseInt(m[1]); if (num>maxNum) maxNum = num; }
  });
  // 連番パターンが見つからない場合は人数+1を使う
  if (maxNum===0) maxNum = list.length;
  return prefix + (maxNum+1);
}

function openAddPlayer(){
  S.addPlayerModal = {gender:'m', name:nextSuggestedName('m'), isAutoFilled:true};
  renderAddPlayerModal();
}
function closeAddPlayerModal(){
  var ov = document.getElementById('add-player-overlay');
  if (ov) document.body.removeChild(ov);
}

function renderAddPlayerModal(){
  closeAddPlayerModal();
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'add-player-overlay';

  var gender = (S.addPlayerModal && S.addPlayerModal.gender) || 'm';
  var nameVal = (S.addPlayerModal && S.addPlayerModal.name) || '';

  var html = '<div class="modal-box" style="text-align:left">'
    + '<div class="modal-title" style="text-align:center">➕ 人を追加</div>'
    + '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:14px;text-align:center">後ろの番号として追加します。次のゲームは必ず出場、その後は元から居たメンバーと同じように混ざります。</div>'
    + '<div style="display:flex;gap:8px;margin-bottom:12px">'
    + '<button type="button" class="cbtn'+(gender==='m'?' on':'')+'" onclick="setAddPlayerGender(&quot;m&quot;)">👨 男性</button>'
    + '<button type="button" class="cbtn'+(gender==='f'?' on':'')+'" onclick="setAddPlayerGender(&quot;f&quot;)">👩 女性</button>'

    + '<input type="text" id="ap-name-input" class="ninp" style="width:100%;margin-bottom:14px" placeholder="名前を入力" maxlength="8" value="'+esc(nameVal)+'" oninput="onAddPlayerNameInput(this.value)">'
    + '<div class="modal-btns" style="margin-top:14px">'
    + '<button type="button" class="modal-btn-y" onclick="cancelAddPlayer()">キャンセル</button>'
    + '<button type="button" class="modal-btn-n" onclick="confirmAddPlayer()">追加する</button>'
    + '</div></div>';

  overlay.innerHTML = html;
  document.body.appendChild(overlay);

  // フォーカス（カーソル位置は末尾に）
  setTimeout(function(){
    var inp = document.getElementById('ap-name-input');
    if (inp){ inp.focus(); var v=inp.value; inp.value=''; inp.value=v; }
  }, 50);
}

function setAddPlayerGender(g){
  if (!S.addPlayerModal) S.addPlayerModal = {gender:'m', name:'', isAutoFilled:true};
  var inp = document.getElementById('ap-name-input');
  var currentVal = inp ? inp.value : (S.addPlayerModal.name || '');
  // 名前欄が空、またはまだ自動入力された値のまま手動編集されていない場合のみ、新しい性別の提案に差し替える
  var wasAutoFilled = S.addPlayerModal.isAutoFilled !== false;
  S.addPlayerModal.gender = g;
  if (!currentVal || wasAutoFilled){
    S.addPlayerModal.name = nextSuggestedName(g);
    S.addPlayerModal.isAutoFilled = true;
  } else {
    S.addPlayerModal.name = currentVal;
  }
  renderAddPlayerModal();
}
function onAddPlayerNameInput(v){
  if (!S.addPlayerModal) S.addPlayerModal = {gender:'m', name:''};
  S.addPlayerModal.name = v;
  S.addPlayerModal.isAutoFilled = false; // 手動で編集されたら自動提案の上書き対象から外す
}
function cancelAddPlayer(){
  S.addPlayerModal = null;
  closeAddPlayerModal();
}
function confirmAddPlayer(){
  var nameInput = document.getElementById('ap-name-input');
  var name = nameInput ? nameInput.value.trim() : '';
  if (!name){ if(nameInput) nameInput.focus(); return; }
  var allNames = S.mNames.concat(S.fNames);
  if (allNames.indexOf(name) >= 0){ alert('同じ名前がすでに存在します'); return; }
  var gender = (S.addPlayerModal && S.addPlayerModal.gender) || 'm';
  S.addPlayerModal = null;
  closeAddPlayerModal();
  addPlayerToGame(name, gender);
}

function addPlayerToGame(name, gender){
  if (gender==='m'){
    S.mNames.push(name);
    S.men = S.mNames.length;
  } else {
    S.fNames.push(name);
    S.women = S.fNames.length;
  }
  // 参加開始ゲーム番号を記録。出場率計算は「参加してからのゲーム数」ベースになるので、
  // 自動的に「入ってからは他と同じペース、遅れた分は回数が少ないまま」の動きになる。
  S.joinedAt = S.joinedAt || {};
  S.joinedAt[name] = S.gi + 1; // 次のゲーム(gi+1)から参加
  // 追加した直後の次のゲームでは必ず出場させる
  S.forcePlayNext = S.forcePlayNext || [];
  S.forcePlayNext.push(name);
  saveState();
  render();
  // 続けてペア/チーム編成するか確認
  renderAddPlayerUnitPrompt(name);
}

// ペア/チーム編成用モーダル（既存のtoggleTeamSel等のロジックを流用）
function renderUnitEditModal(){
  var ov = document.getElementById('unit-edit-overlay');
  if (ov) document.body.removeChild(ov);

  var mN = S.mNames, fN = S.fNames;
  var usedM={}, usedF={};
  S.teams.forEach(function(t){ usedM[t.m1]=true; usedM[t.m2]=true; usedF[t.f1]=true; usedF[t.f2]=true; });
  S.pairs.forEach(function(p){ usedM[p.mIdx]=true; usedF[p.fIdx]=true; });
  var freeM = mN.filter(function(_,i){ return !usedM[i]; });
  var freeF = fN.filter(function(_,i){ return !usedF[i]; });

  var html = '<div class="modal-box" style="text-align:left;max-height:80vh;overflow-y:auto">'
    + '<div class="modal-title" style="text-align:center">🌟🌿 ペア / チーム編成</div>';

  // 既存チーム一覧
  if (S.teams.length>0){
    html += '<div style="font-size:11px;color:var(--green);font-weight:800;margin:10px 0 6px">登録済みチーム</div><div class="unit-list">';
    S.teams.forEach(function(t,i){
      var members=[mN[t.m1],mN[t.m2],fN[t.f1],fN[t.f2]];
      html += '<div class="unit-row team-row">'
        + '<span style="color:var(--green);font-size:13px;font-weight:900">🌿</span>'
        + '<span style="flex:1;font-size:12px;font-weight:800;color:var(--green)">'+members.map(esc).join(' / ')+'</span>'
        + '<button class="pclear-btn" data-team-remove="'+i+'">✕</button></div>';
    });
    html += '</div>';
  }
  // 既存ペア一覧
  if (S.pairs.length>0){
    html += '<div style="font-size:11px;color:var(--yellow);font-weight:800;margin:10px 0 6px">登録済みペア</div><div class="unit-list">';
    S.pairs.forEach(function(p,i){
      if (mN[p.mIdx]===undefined || fN[p.fIdx]===undefined) return;
      html += '<div class="unit-row pair-row">'
        + '<span style="color:var(--yellow);font-size:13px">🌟</span>'
        + '<span style="flex:1;font-size:13px;font-weight:800;color:var(--yellow)">'+esc(mN[p.mIdx])+' × '+esc(fN[p.fIdx])+'</span>'
        + '<button class="pclear-btn" data-pair-remove="'+i+'">✕</button></div>';
    });
    html += '</div>';
  }

  html += '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin:14px 0 6px">🌿 新規チーム作成（男2+女2をタップ）</div>';
  if (freeM.length>=2 && freeF.length>=2){
    html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:4px">男性</div><div class="player-grid">';
    freeM.forEach(function(nm){ html += '<button class="psel-btn" data-team-sel="'+esc(nm)+'">'+esc(nm)+'</button>'; });
    html += '</div><div style="font-size:10px;color:rgba(255,255,255,0.4);margin:6px 0 4px">女性</div><div class="player-grid">';
    freeF.forEach(function(nf){ html += '<button class="psel-btn" data-team-sel="'+esc(nf)+'">'+esc(nf)+'</button>'; });
    html += '</div><div class="sel-info" id="ap-team-sel-info">選択中: 0/4人</div>'
      + '<button class="tadd-btn" id="ap-team-add" style="width:100%;margin-top:8px;opacity:0.4" disabled>このチームを登録 🌿</button>';
  } else {
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.35)">未編成の男女が足りません</div>';
  }

  html += '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin:16px 0 6px">🌟 新規ペア作成（男女1人ずつ選択）</div>';
  if (freeM.length>0 && freeF.length>0){
    html += '<div class="unit-row"><select class="psel" id="ap-pair-m">';
    freeM.forEach(function(nm){ html += '<option value="'+mN.indexOf(nm)+'">'+esc(nm)+'</option>'; });
    html += '</select><span style="color:var(--yellow);font-size:14px;flex-shrink:0">🌟</span><select class="psel" id="ap-pair-f">';
    freeF.forEach(function(nf){ html += '<option value="'+fN.indexOf(nf)+'">'+esc(nf)+'</option>'; });
    html += '</select><button class="padd-btn" id="ap-pair-add">追加</button></div>';
  } else {
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.35)">未編成の男女がいません</div>';

  overlay.id = 'unit-edit-overlay';

  overlay.querySelectorAll ? overlay.querySelectorAll('[data-team-remove]').forEach(function(btn){
    btn.onclick = function(){ S.teams.splice(parseInt(btn.getAttribute('data-team-remove')),1); saveState(); render(); renderUnitEditModal(); };

      if (addBtn){ addBtn.disabled = !ok; addBtn.style.opacity = ok ? '1' : '0.4'; }
    };
  });
  var teamAddBtn = document.getElementById('ap-team-add');
  if (teamAddBtn) teamAddBtn.onclick = function(){
    var selM = teamSelLocal.filter(function(x){return mN.indexOf(x)>=0;});
    var selF = teamSelLocal.filter(function(x){return fN.indexOf(x)>=0;});
    if (selM.length!==2 || selF.length!==2) return;
    S.teams.push({m1:mN.indexOf(selM[0]), m2:mN.indexOf(selM[1]), f1:fN.indexOf(selF[0]), f2:fN.indexOf(selF[1])});
    saveState(); render();

  };

  if (pairAddBtn) pairAddBtn.onclick = function(){
    var mEl=document.getElementById('ap-pair-m'), fEl=document.getElementById('ap-pair-f');
    var mi=parseInt(mEl.value), fi=parseInt(fEl.value);
    S.pairs.push({mIdx:mi, fIdx:fi});
    saveState(); render();
    renderUnitEditModal();
  };

  var doneBtn = document.getElementById('ap-unit-done');
  if (doneBtn) doneBtn.onclick = function(){
    document.body.removeChild(overlay);
  };
}

function resumeGame(){
  var saved = loadSave();
  if (!saved) return;
  S.men = saved.men||6; S.women = saved.women||6; S.courts = saved.courts||1;
  S.mNames = saved.mNames||[]; S.fNames = saved.fNames||[];
  S.pairs = saved.pairs||[]; S.teams = saved.teams||[];
  S.gi = saved.gi||0; S.pw = saved.pw||{}; S.pc = saved.pc||{};
  S.hist = saved.hist||[];
  S.lapShownGi = saved.lapShownGi!==undefined ? saved.lapShownGi : -1;
  S.forcePlayNext = saved.forcePlayNext||[];
  S.joinedAt = saved.joinedAt||{};
  S.step = saved.step||'setup'; S.setupStep = saved.setupStep||'count';
  S.game = S.hist.length>0 ? S.hist[S.hist.length-1] : null;
  S.showResume = false; S.stats=false; S.histView=false;
  render(); window.scrollTo(0,0);
}

// 起動時
(function(){
  var saved = loadSave();
  if (saved && saved.gi>0){
    S.showResume = true;
    S.savedInfo = {gi: saved.gi, men: saved.men, women: saved.women};
  }
  render();
})();
</script>
